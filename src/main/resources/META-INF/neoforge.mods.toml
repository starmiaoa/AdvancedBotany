modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="assets/advancedbotany/textures/logo.png"
authors="${mod_authors}"
credits="Vazkii / Botania"
description='''${mod_description}'''

[[dependencies."${mod_id}"]]
    modId="neoforge"
    type="required"
    versionRange="${neoforge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies."${mod_id}"]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies."${mod_id}"]]
    modId="botania"
    type="required"
    versionRange="${botania_version_range}"
    ordering="AFTER"
    side="BOTH"

[[dependencies."${mod_id}"]]
    modId="curios"
    type="required"
    versionRange="${curios_version_range}"
    ordering="AFTER"
    side="BOTH"

[[dependencies."${mod_id}"]]
    modId="patchouli"
    type="required"
    versionRange="${patchouli_version_range}"
    ordering="AFTER"
    side="BOTH"

[[dependencies."${mod_id}"]]
    modId="jei"
    type="optional"
    versionRange="${jei_version_range}"
    ordering="NONE"
    side="BOTH"
